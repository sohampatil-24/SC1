<html lang="en">
<head>
    <title>Scrolling</title>
</head>
<body style="height: 2000px;">
     <h2>Scroll the page</h2>
     <p id="msg"></p>

    <script>
        window.onscroll = function () {
         document.getElementById("msg").innerText = "Page is scrolling...";
        };
    </script>
</body>
</html>
